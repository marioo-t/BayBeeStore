<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="pageTitle">Product | Bay Bee Store</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandYellow: '#ffd800',
                        brandDark: '#222',
                        brandDeepDark: '#111',
                        brandGrey: '#333',
                    },
                    fontFamily: {
                        sans: ['Manrope', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;800&display=swap" rel="stylesheet" />
</head>
<body class="bg-brandGrey text-white font-sans" data-root-prefix="../../" data-product-slug="replace-me">
    <header class="bg-brandDark sticky top-0 z-50 shadow-lg border-b border-white/5">
        <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-20">
            <a href="../../index.html" class="text-2xl font-extrabold tracking-tighter text-brandYellow">BAY BEE STORE</a>
            <ul class="hidden md:flex space-x-8 font-semibold text-sm uppercase tracking-wider">
                <li><a class="hover:text-brandYellow transition-colors" href="../../index.html">Home</a></li>
                <li><a class="text-brandYellow" href="../../categories/style.html">Style</a></li>
                <li><a class="hover:text-brandYellow transition-colors" href="../../categories/coffee.html">Coffee</a></li>
                <li><a class="hover:text-brandYellow transition-colors" href="../../categories/wellness.html">Wellness</a></li>
                <li><a class="hover:text-brandYellow transition-colors" href="../../categories/extras.html">Extras</a></li>
                <li><a class="hover:text-brandYellow transition-colors" href="../../about-us.html">About Us</a></li>
            </ul>
            <div class="flex items-center space-x-5">
                <button class="text-xl hover:text-brandYellow transition-transform hover:scale-110 relative" aria-label="Open cart">🛒</button>
            </div>
        </nav>
    </header>

    <main id="productPageContent">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <nav class="text-sm text-gray-400">
                <a href="../../index.html" class="hover:text-brandYellow">Home</a>
                <span class="mx-2">/</span>
                <a id="breadcrumbCategoryLink" href="../../categories/style.html" class="hover:text-brandYellow"><span id="breadcrumbCategoryName">Style</span></a>
                <span class="mx-2">/</span>
                <span id="breadcrumbProductName" class="text-white">Loading...</span>
            </nav>
        </div>

        <section class="py-8 px-4 bg-brandGrey">
            <div class="max-w-7xl mx-auto">
                <div class="grid md:grid-cols-2 gap-12">
                    <div>
                        <div class="bg-brandDark rounded-2xl overflow-hidden mb-4 aspect-square">
                            <img id="mainImage" src="../../images/feature.jpg" alt="Product image" class="w-full h-full object-cover" />
                        </div>
                        <div id="thumbnailGallery" class="grid grid-cols-4 gap-3"></div>
                    </div>

                    <div>
                        <span id="productBadge" class="hidden inline-flex mb-4 px-3 py-1 bg-brandYellow text-brandDeepDark text-xs font-bold rounded-full"></span>
                        <h1 id="productName" class="text-4xl md:text-5xl font-extrabold mb-4 tracking-tight">Loading product...</h1>
                        <div id="productPrice" class="text-4xl font-bold text-brandYellow mb-6">$0.00</div>
                        <p id="productDescription" class="text-gray-300 leading-relaxed mb-8"></p>

                        <div id="sizeSelectorWrapper" class="mb-6 hidden">
                            <label class="block text-sm font-semibold mb-3 text-white">Size</label>
                            <div id="sizeSelector" class="flex flex-wrap gap-3"></div>
                        </div>

                        <div id="colorSelectorWrapper" class="mb-6 hidden">
                            <label class="block text-sm font-semibold mb-3 text-white">Color</label>
                            <div id="colorSelector" class="flex gap-3 flex-wrap"></div>
                        </div>

                        <div class="mb-8">
                            <label class="block text-sm font-semibold mb-3 text-white">Quantity</label>
                            <div class="flex items-center gap-4">
                                <button id="decreaseQty" type="button" class="w-12 h-12 bg-brandDark rounded-lg hover:bg-brandYellow hover:text-brandDeepDark transition-colors font-bold text-xl">−</button>
                                <input id="quantity" type="number" value="1" min="1" class="w-20 h-12 text-center bg-brandDark border border-white/20 rounded-lg text-white font-semibold" readonly />
                                <button id="increaseQty" type="button" class="w-12 h-12 bg-brandDark rounded-lg hover:bg-brandYellow hover:text-brandDeepDark transition-colors font-bold text-xl">+</button>
                            </div>
                        </div>

                        <button id="addToCartButton" type="button" class="w-full py-4 bg-brandYellow text-brandDeepDark font-bold text-lg rounded-lg hover:bg-white transition-all mb-4 shadow-lg hover:shadow-xl">Add to Cart 🛒</button>
                        <button id="buyNowButton" type="button" class="w-full py-4 bg-transparent border-2 border-brandYellow text-brandYellow font-bold text-lg rounded-lg hover:bg-brandYellow hover:text-brandDeepDark transition-all">Buy Now</button>
                        <p id="productMessage" class="hidden mt-4 text-brandYellow font-semibold"></p>

                        <div class="mt-8 pt-8 border-t border-white/10">
                            <h3 class="font-bold text-xl mb-4">Product Details</h3>
                            <ul id="productDetailsList" class="space-y-2 text-gray-300"></ul>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="dynamicSectionsWrapper" class="py-16 px-4 bg-brandDark hidden">
            <div class="max-w-7xl mx-auto">
                <div id="dynamicSections"></div>
            </div>
        </section>

        <section class="py-16 px-4 bg-brandDeepDark">
            <div class="max-w-7xl mx-auto">
                <h2 class="text-3xl font-bold mb-8 text-center">You May Also Like</h2>
                <div id="relatedProductsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
            </div>
        </section>
    </main>

    <footer class="bg-brandDeepDark py-12 border-t border-white/5">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-center text-gray-500 text-sm">
                <p>© 2025 Bay Bee Store. All rights reserved.</p>
                <nav class="mt-4 md:mt-0 flex space-x-8">
                    <a class="hover:text-brandYellow transition-colors" href="../../privacy-policy.html">Privacy Policy</a>
                    <a class="hover:text-brandYellow transition-colors" href="../../terms-of-service.html">Terms of Service</a>
                    <a class="hover:text-brandYellow transition-colors" href="../../refund-policy.html">Refund Policy</a>
                    <a class="hover:text-brandYellow transition-colors" href="../../shipping-policy.html">Shipping Policy</a>
                </nav>
            </div>
        </div>
    </footer>

    <script src="../../assets/catalog.js"></script>
    <script src="../../assets/product-page.js"></script>
</body>
</html>
