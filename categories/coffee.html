<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collection | Bay Bee Store</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandYellow: '#ffd800',
                        brandDark: '#222',
                        brandDeepDark: '#111',
                        brandGrey: '#333',
                    },
                    fontFamily: {
                        sans: ['Manrope', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;800&display=swap" rel="stylesheet" />
</head>
<body class="bg-brandGrey text-white font-sans" data-root-prefix="../" data-category="coffee">
    <header class="bg-brandDark sticky top-0 z-50 shadow-lg border-b border-white/5">
        <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-20">
            <a href="../index.html" class="text-2xl font-extrabold tracking-tighter text-brandYellow">BAY BEE STORE</a>
            <ul class="hidden md:flex space-x-8 font-semibold text-sm uppercase tracking-wider">
                <li><a class="hover:text-brandYellow transition-colors" href="../index.html">Home</a></li>
                <li><a class=" hover:text-brandYellow transition-colors" href="style.html">Style</a></li>
                <li><a class="text-brandYellow hover:text-brandYellow transition-colors" href="coffee.html">Coffee</a></li>
                <li><a class=" hover:text-brandYellow transition-colors" href="wellness.html">Wellness</a></li>
                <li><a class=" hover:text-brandYellow transition-colors" href="extras.html">Extras</a></li>
                <li><a class="hover:text-brandYellow transition-colors" href="../about-us.html">About Us</a></li>
            </ul>
        </nav>
    </header>

    <section class="relative py-24 px-4 bg-gradient-to-b from-brandDark to-brandGrey">
        <div class="max-w-7xl mx-auto text-center">
            <h1 id="categoryTitle" class="text-5xl md:text-7xl font-extrabold mb-6 tracking-tight">Collection</h1>
            <p id="categoryDescription" class="text-gray-300 text-xl mb-8 max-w-2xl mx-auto">Loading category data...</p>
            <div id="categoryBadges" class="flex justify-center gap-4 flex-wrap"></div>
            <div class="mt-6">
                <span id="categoryCount" class="px-4 py-2 bg-brandYellow/20 text-brandYellow rounded-full text-sm font-semibold">0 Products</span>
            </div>
        </div>
    </section>

    <section class="py-8 px-4 bg-brandGrey border-b border-white/10">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div id="filtersBar" class="flex flex-wrap gap-3"></div>
                <select id="sortProducts" class="px-6 py-2 bg-brandDark border border-white/20 rounded-lg text-white focus:outline-none focus:border-brandYellow">
                    <option value="featured">Featured</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                    <option value="name">Name: A-Z</option>
                </select>
            </div>
        </div>
    </section>

    <section class="py-12 px-4 bg-brandGrey">
        <div class="max-w-7xl mx-auto">
            <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
            <div id="noProducts" class="hidden text-center py-20">
                <p class="text-2xl text-gray-400">No products found in this category yet.</p>
            </div>
        </div>
    </section>

    <footer class="bg-brandDeepDark py-12 border-t border-white/5">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-center text-gray-500 text-sm">
                <p>© 2025 Bay Bee Store. All rights reserved.</p>
                <nav class="mt-4 md:mt-0 flex space-x-8">
                    <a class="hover:text-brandYellow transition-colors" href="../privacy-policy.html">Privacy Policy</a>
                    <a class="hover:text-brandYellow transition-colors" href="../terms-of-service.html">Terms of Service</a>
                    <a class="hover:text-brandYellow transition-colors" href="../refund-policy.html">Refund Policy</a>
                    <a class="hover:text-brandYellow transition-colors" href="../shipping-policy.html">Shipping Policy</a>
                </nav>
            </div>
        </div>
    </footer>

    <script src="../assets/catalog.js"></script>
    <script src="../assets/category-page.js"></script>
</body>
</html>
